services:
  db:
    image: postgres:16-alpine
    container_name: sidwala-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-sidwala}
      POSTGRES_USER: ${POSTGRES_USER:-sidwala}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sidwala_secret_2024}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sidwala}"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sidwala-app
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8080}:3000"
    environment:
      NODE_ENV: production
      DATABASE_URL: postgres://${POSTGRES_USER:-sidwala}:${POSTGRES_PASSWORD:-sidwala_secret_2024}@db:5432/${POSTGRES_DB:-sidwala}
      JWT_SECRET: ${JWT_SECRET:-sidwala-super-secret-jwt-key-change-me}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin123}
      ADMIN_DISPLAY_NAME: ${ADMIN_DISPLAY_NAME:-Admin}
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
    driver: local
